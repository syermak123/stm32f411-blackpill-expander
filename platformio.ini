[platformio]
default_envs = blackpill_f411ce

[env:blackpill_f411ce]
platform = ststm32
board = blackpill_f411ce
framework = stm32cube
upload_protocol = stlink
debug_tool = stlink
; If upload fails with "unable to connect to the target": wire ST-Link NRST -> board NRST,
; then uncomment the next two lines (connects while MCU is held in reset).
;upload_flags = -c reset_config srst_only connect_assert_srst
monitor_speed = 115200
build_flags =
  -D STM32F411xE
